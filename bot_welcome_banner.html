<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
  .banner {
    width: 640px; height: 360px;
    background: linear-gradient(135deg, #0a0a0f 0%, #1a1030 40%, #0d0d1a 100%);
    border-radius: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .banner::before {
    content: '';
    position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 40%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(124, 58, 237, 0.1) 0%, transparent 50%);
  }
  .glow {
    position: absolute; width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, transparent 70%);
    top: 20%; left: 50%; transform: translate(-50%, -50%);
  }
  .ghost { font-size: 72px; position: relative; z-index: 2; margin-bottom: 12px; filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.5)); }
  .title { font-size: 36px; font-weight: 800; color: #fff; position: relative; z-index: 2; letter-spacing: -0.5px; }
  .title span { background: linear-gradient(135deg, #a855f7, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { font-size: 16px; color: #a0a0b0; position: relative; z-index: 2; margin-top: 8px; letter-spacing: 2px; text-transform: uppercase; }
  .features {
    display: flex; gap: 24px; margin-top: 20px; position: relative; z-index: 2;
  }
  .feat {
    display: flex; align-items: center; gap: 6px; font-size: 13px; color: #c084fc;
    background: rgba(168, 85, 247, 0.1); padding: 6px 14px; border-radius: 20px;
    border: 1px solid rgba(168, 85, 247, 0.2);
  }
  .line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, #a855f7, transparent);
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="glow"></div>
    <div class="ghost">👻</div>
    <div class="title"><span>Ghost Pix</span> Assistente</div>
    <div class="subtitle">Seu parceiro de vendas no Telegram</div>
    <div class="features">
      <div class="feat">💰 Saldo</div>
      <div class="feat">⚡ PIX</div>
      <div class="feat">📊 Vendas</div>
      <div class="feat">🏦 Saques</div>
    </div>
    <div class="line"></div>
  </div>
</body>
</html>
